services:
  - type: web
    name: afaaq-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: Laravel
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: APP_LOCALE
        value: en
      - key: APP_FALLBACK_LOCALE
        value: en
      - key: APP_FAKER_LOCALE
        value: en_US
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: afaaq-postgres
          property: connectionString
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_STORE
        value: redis
      - key: FILESYSTEM_DISK
        value: local
      - key: REDIS_CLIENT
        value: predis
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: afaaq-redis
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: afaaq-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: afaaq-redis
          property: port
      - key: MAIL_MAILER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: hello@example.com
      - key: MAIL_FROM_NAME
        value: Laravel
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGO
        value: HS256

  - type: keyvalue
    name: afaaq-redis
    plan: free
    region: frankfurt
    ipAllowList: []

databases:
  - name: afaaq-postgres
    plan: free
    region: frankfurt
    databaseName: afaaq
    user: afaaq
